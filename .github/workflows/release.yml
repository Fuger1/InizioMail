name: Release

# Build and publish a GitHub Release whenever a semver tag (v1.2.3) is pushed.
# Trigger flow:
#   npm version patch|minor|major   -> bumps package.json + creates a git tag
#   git push --follow-tags           -> pushes the commit and the tag
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required for electron-builder to create/upload the Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release -- --win
